name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.os }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            suffix: ''
          - os: ubuntu-latest
            target: linux-arm64
            suffix: ''
          - os: macos-13
            target: macos-x64
            suffix: ''
          - os: macos-latest
            target: macos-arm64
            suffix: ''
          - os: windows-latest
            target: windows-x64
            suffix: '.exe'

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build CLI executable
        run: |
          bun build --compile --target=bun-${{ matrix.target }} ./src/index.ts --outfile fuck-u-code-${{ matrix.target }}${{ matrix.suffix }}

      - name: Build MCP executable
        run: |
          bun build --compile --target=bun-${{ matrix.target }} ./src/mcp/server.ts --outfile fuck-u-code-mcp-${{ matrix.target }}${{ matrix.suffix }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            fuck-u-code-${{ matrix.target }}${{ matrix.suffix }}
            fuck-u-code-mcp-${{ matrix.target }}${{ matrix.suffix }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f -exec file {} \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## ${{ github.ref_name }}

            Standalone executables — no Node.js or npm required.

            | Platform | CLI | MCP Server |
            | -------- | --- | ---------- |
            | Linux x64 | `fuck-u-code-linux-x64` | `fuck-u-code-mcp-linux-x64` |
            | Linux ARM64 | `fuck-u-code-linux-arm64` | `fuck-u-code-mcp-linux-arm64` |
            | macOS x64 | `fuck-u-code-macos-x64` | `fuck-u-code-mcp-macos-x64` |
            | macOS ARM64 | `fuck-u-code-macos-arm64` | `fuck-u-code-mcp-macos-arm64` |
            | Windows x64 | `fuck-u-code-windows-x64.exe` | `fuck-u-code-mcp-windows-x64.exe` |

            > This project is a fork of [Done-0/fuck-u-code](https://github.com/Done-0/fuck-u-code).
          draft: false
          prerelease: false
          generate_release_notes: true
          make_latest: true
          files: artifacts/*
